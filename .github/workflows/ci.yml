name: CI

# Local deterministic checks and tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflow_ci: ${{ steps.filter.outputs.workflow_ci }}
      skills: ${{ steps.filter.outputs.skills }}
      run_rust_ci: ${{ steps.classify.outputs.run_rust_ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
            workflow_ci:
              - '.github/workflows/ci.yml'
            skills:
              - 'skills/**'

      - name: Classify CI scope
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          run_rust_ci=false
          if [[ "${{ steps.filter.outputs.rust }}" == "true" || "${{ steps.filter.outputs.workflow_ci }}" == "true" ]]; then
            run_rust_ci=true
          fi
          echo "run_rust_ci=${run_rust_ci}" >> "${GITHUB_OUTPUT}"

  fast-path:
    name: Fast Path (docs-only)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust_ci != 'true' && needs.changes.outputs.skills != 'true'

    steps:
      - name: Skip heavy jobs
        run: echo "No Rust/workflow/skills changes detected; skipping heavy CI jobs."

  lint-skills:
    name: Lint (skills)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.skills == 'true' || needs.changes.outputs.workflow_ci == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate skills
        run: |
          set -euo pipefail
          for script in skills/*/scripts/validate.sh; do
            if [ -f "$script" ]; then
              echo "Running validator: $script"
              bash "$script"
            fi
          done

  rust-quality:
    name: Rust Quality (stable)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-quality-stable

      - name: Run clippy
        run: cargo clippy -- -D warnings -A non_camel_case_types -A unused_variables -A unused_imports -A dead_code -A clippy::upper_case_acronyms -A clippy::enum_variant_names -A clippy::vec_init_then_push -A clippy::type_complexity

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable
          - beta
          - nightly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-${{ matrix.rust }}

      - name: Run tests (stable)
        if: matrix.rust == 'stable'
        run: cargo test --verbose -- --test-threads=1

      - name: Run compatibility check (beta/nightly)
        if: matrix.rust != 'stable'
        run: cargo check --all-targets --all-features

  local-e2e:
    name: Local E2E Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-local-e2e

      - name: Build uxc and test servers
        run: |
          cargo build --release --bin uxc
          cargo build --release --features test-server \
            --bin uxc-test-openapi-server \
            --bin uxc-test-graphql-server \
            --bin uxc-test-jsonrpc-server

      - name: Run local E2E tests
        run: cargo test --test local_e2e_test --verbose -- --test-threads=1

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust_ci == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-security

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2025-0134

  build-pr:
    name: Build (PR Linux)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.run_rust_ci == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-pr-linux

      - name: Build
        run: cargo build --release

  build-main:
    name: Build (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: github.event_name == 'push' && needs.changes.outputs.run_rust_ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-${{ runner.os }}-${{ matrix.target }}

      - name: Build
        run: cargo build --target ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/uxc*
